<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>刻圖分享牆 - Lohas 樂活眼鏡</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/gallery02.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
</head>
<body>
  <div id="site-header"></div>

  <main class="gallery02-page">
    <section class="gallery02-hero">
      <div class="gallery02-hero-content">
        <p class="hero-subtitle">分享你的刻圖照片，給更多人靈感</p>
        <h1 class="hero-title">大家都這樣刻</h1>
        <div class="hero-btns">
          <button type="button" class="btn btn-primary js-open-upload">分享照片</button>
          <a href="#galleryGrid" class="btn btn-outline">看看大家怎麼刻</a>
        </div>
      </div>
      <div class="gallery02-hero-bg">
        <picture>
          <source media="(max-width: 768px)" srcset="images/hero-banner-gallery-mobile.jpg">
          <img src="images/hero-banner-gallery.jpg" alt="刻圖分享牆">
        </picture>
      </div>
    </section>

    <section class="gallery02-filter-section" aria-label="刻圖分享篩選">
      <div class="filter-inner">
        <div class="filter-row filter-row-main">
          <div class="filter-select-group">
            <label for="desktopTopicFilter">主題分類</label>
            <select id="desktopTopicFilter" class="filter-select">
              <option value="全部">全部主題</option>
              <option value="愛情紀念">愛情紀念</option>
              <option value="家人親情">家人親情</option>
              <option value="寵物回憶">寵物回憶</option>
              <option value="心靈寄託">心靈寄託</option>
              <option value="個人簽名">個人簽名</option>
              <option value="生日節慶">生日節慶</option>
              <option value="企業團體">企業團體</option>
              <option value="開運祝福">開運祝福</option>
              <option value="客製圖案">客製圖案</option>
            </select>
          </div>
          <div class="hot-topic-area">
            <span class="hot-topic-label">熱門主題</span>
            <div class="hot-chip-scroll" id="hotChipScroll">
              <button type="button" class="topic-chip active" data-topic="全部">全部</button>
              <button type="button" class="topic-chip" data-topic="愛情紀念"><i class="fa-regular fa-heart"></i>愛情紀念</button>
              <button type="button" class="topic-chip" data-topic="個人簽名"><i class="fa-solid fa-pen-nib"></i>個人簽名</button>
              <button type="button" class="topic-chip" data-topic="寵物回憶"><i class="fa-solid fa-paw"></i>寵物回憶</button>
              <button type="button" class="topic-chip" data-topic="心靈寄託"><i class="fa-solid fa-leaf"></i>心靈寄託</button>
              <button type="button" class="topic-chip" data-topic="企業團體"><i class="fa-regular fa-building"></i>企業團體</button>
              <button type="button" class="topic-chip" data-topic="開運祝福"><i class="fa-solid fa-wand-magic-sparkles"></i>開運祝福</button>
              <button type="button" class="topic-chip more-topic-chip" id="openThemeModal">更多主題 <i class="fa-solid fa-chevron-down"></i></button>
            </div>
          </div>
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" id="desktopSearchInput" placeholder="搜尋文字 / 名字 / 主題...">
          </div>
        </div>
        <div class="filter-row filter-row-sub" id="subFilterRow" hidden>
          <span class="sub-filter-label">細項</span>
          <div class="sub-chip-scroll" id="subChipScroll"></div>
          <button type="button" class="clear-sub-filter" id="clearSubFilter">清除細項</button>
        </div>
      </div>
    </section>

    <section class="gallery02-results">
      <div class="result-bar">
        <div class="result-meta" id="resultMeta">共 0 筆分享</div>
        <select id="sortSelect" class="sort-select">
          <option value="newest">最新分享</option>
          <option value="popular">人氣排序</option>
        </select>
      </div>
      <div class="gallery02-grid" id="galleryGrid"></div>
    </section>

    <section class="gallery02-cta">
      <div class="cta-left">
        <div class="cta-icon"><i class="fa-solid fa-camera"></i></div>
        <div><h2>你的刻圖，也值得被看見。</h2><p>分享你的刻圖照片，讓更多人找到屬於自己的靈感。</p></div>
      </div>
      <button type="button" class="btn-upload js-open-upload">分享照片</button>
    </section>
  </main>

  <div id="themeModal" class="theme-modal-overlay" aria-hidden="true">
    <section class="theme-modal" role="dialog" aria-modal="true" aria-labelledby="themeModalTitle">
      <div class="theme-modal-header">
        <div><h2 id="themeModalTitle">更多主題分類</h2><p>選擇主題，或展開細項快速找到想看的靈感。</p></div>
        <button type="button" class="modal-close" id="closeThemeModal" aria-label="關閉更多主題">&times;</button>
      </div>
      <div class="theme-grid" id="themeGrid"></div>
      <div class="theme-modal-footer">
        <div class="theme-help"><i class="fa-regular fa-lightbulb"></i> 找不到想要的主題？可以先用搜尋找名字、文字或靈感。</div>
        <button type="button" class="theme-apply-all" data-topic="全部">查看全部分享</button>
      </div>
    </section>
  </div>

  <div id="detailModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-content detail-modal" role="dialog" aria-modal="true">
      <div class="modal-header"><h2>刻圖分享</h2><button type="button" id="closeDetail" class="close-btn" aria-label="關閉分享詳情">&times;</button></div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>

  <div id="uploadModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-content upload-modal" role="dialog" aria-modal="true">
      <div class="modal-header"><h2 id="uploadModalTitle">分享你的刻圖 <span class="subtitle">可拖曳調整首圖順序</span></h2><button type="button" id="closeUpload" class="close-btn" aria-label="關閉上傳視窗">&times;</button></div>
      <div class="modal-body">
        <input id="fileInput" class="hidden-file-input" type="file" accept="image/*" />
        <div class="upload-grid">
          <div class="upload-box main-upload" data-slot="0" tabindex="0" role="button" aria-label="上傳首圖"><span class="badge-main">首圖</span><div class="upload-placeholder"><i class="fa-regular fa-image"></i><p>新增圖片</p><span>點擊選擇，或拖曳圖片到這裡</span></div></div>
          <div class="sub-upload-container">
            <div class="upload-box sub-upload" data-slot="1" tabindex="0" role="button" aria-label="上傳圖片二"><div class="upload-placeholder"><i class="fa-regular fa-image"></i><p>新增圖片</p><span>副圖</span></div></div>
            <div class="upload-box sub-upload" data-slot="2" tabindex="0" role="button" aria-label="上傳圖片三"><div class="upload-placeholder"><i class="fa-regular fa-image"></i><p>新增圖片</p><span>副圖</span></div></div>
          </div>
        </div>
        <div class="form-section">
          <div class="form-row"><label for="workTitle">分享名稱</label><input id="workTitle" type="text" maxlength="24" placeholder="例如：把回憶刻在日常裡" /><p class="field-error" id="workTitleError"></p></div>
          <div class="two-col">
            <div class="form-row"><label for="workCategory">主題分類</label><select id="workCategory"></select></div>
            <div class="form-row"><label for="carrierCategory">刻圖位置</label><select id="carrierCategory"><option value="鏡片">鏡片</option><option value="鏡框">鏡框</option><option value="眼鏡布">眼鏡布</option><option value="眼鏡盒">眼鏡盒</option><option value="鼻墊">鼻墊</option><option value="其他周邊配件">其他周邊配件</option></select></div>
          </div>
          <div class="form-row"><label for="shareText">分享故事</label><textarea id="shareText" maxlength="100" placeholder="寫下這份刻圖背後的小故事（最多 100 字）..."></textarea></div>
          <div class="char-counter"><span id="currentChar">0</span>/100</div>
        </div>
      </div>
      <div class="modal-footer"><button type="button" class="btn-preview" id="previewBtn">預覽分享</button><button type="button" class="btn-submit" id="submitBtn">送出分享</button></div>
    </div>
  </div>

  <div id="cropModal" class="modal-overlay crop-modal-overlay" aria-hidden="true">
    <div class="modal-content crop-modal" role="dialog" aria-modal="true">
      <div class="modal-header"><h2>調整圖片裁切</h2><button type="button" id="closeCrop" class="close-btn" aria-label="關閉裁切視窗">&times;</button></div>
      <div class="modal-body"><div class="cropper-frame"><img id="cropImage" alt="裁切預覽圖片"></div></div>
      <div class="modal-footer"><button type="button" class="btn-preview" id="cancelCrop">取消</button><button type="button" class="btn-submit" id="applyCrop">套用裁切</button></div>
    </div>
  </div>

  <div id="toast" class="toast">已完成</div>
  <div id="site-footer"></div>
  <script src="js/layout.js"></script>
  <script src="js/gallery02.js"></script>
</body>
</html>
