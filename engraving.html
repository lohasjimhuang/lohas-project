<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獨家雷刻服務 - Lohas 樂活眼鏡</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="engraving-service-page" style="padding-top: 70px;">
        <section class="engraving-hero" style="background-image: url('images/hero-banner.jpg'); background-size: cover; background-position: center; height: 80vh; display: flex; align-items: center; justify-content: center; color: #fff; text-align: center;">
            <div class="hero-content" style="background: rgba(0,0,0,0.3); padding: 40px; border-radius: 15px; backdrop-filter: blur(5px);">
                <p class="hero-subtitle" style="letter-spacing: 2px;">獨一無二的印記，雋刻您的故事</p>
                <h1 class="hero-title" style="font-size: 3rem; margin: 10px 0;">鏡片雷刻工藝</h1>
                <div class="hero-btns" style="margin-top: 20px;">
                    <a href="#process" class="btn btn-primary">了解客製流程</a>
                </div>
            </div>
        </section>

        <section class="engraving-specs" style="padding: 80px 20px; background: #F9F8F6; text-align: center;">
            <h2 style="color: #50422D; margin-bottom: 40px;">專業技術細節</h2>
            <div style="display: flex; gap: 30px; max-width: 1200px; margin: 0 auto; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 250px; background: #fff; padding: 30px; border-radius: 10px;">
                    <i class="fas fa-microchip" style="font-size: 2rem; color: #CDBEA2; margin-bottom: 15px;"></i>
                    <h3 style="color: #50422D;">微米級精度</h3>
                    <p>採用高精密雷射儀器，確保圖騰邊緣銳利且不傷鏡片鍍膜。</p>
                </div>
                <div style="flex: 1; min-width: 250px; background: #fff; padding: 30px; border-radius: 10px;">
                    <i class="fas fa-certificate" style="font-size: 2rem; color: #CDBEA2; margin-bottom: 15px;"></i>
                    <h3 style="color: #50422D;">原廠技術認證</h3>
                    <p>所有雷刻位置皆經過光學數據計算，保證不影響佩戴視野與度數。</p>
                </div>
            </div>
        </section>

        <section id="process" style="padding: 80px 20px; text-align: center;">
            <h2 style="color: #50422D; margin-bottom: 50px;">如何開始您的客製？</h2>
            <div style="display: flex; justify-content: center; align-items: center; gap: 40px; max-width: 900px; margin: 0 auto; flex-wrap: wrap;">
                <div><strong>1. 挑選鏡片</strong><p>選擇適合的材質</p></div>
                <i class="fas fa-arrow-right" style="color: #CDBEA2;"></i>
                <div><strong>2. 設計內容</strong><p>選擇字體或圖騰</p></div>
                <i class="fas fa-arrow-right" style="color: #CDBEA2;"></i>
                <div><strong>3. 專屬製作</strong><p>由專業技師雋刻</p></div>
            </div>
        </section>
    </main>

    </body>
</html>
