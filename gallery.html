<!-- gallery.html -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雷刻靈感分享牆 - Lohas 樂活眼鏡</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="gallery.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header class="main-header">
  <nav class="nav-container">
    <div class="logo">
      <a href="index.html"><img src="images/lohas-logo.svg"></a>
    </div>

    <button class="menu-toggle" id="mobile-menu">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <ul class="nav-links" id="nav-list">
      <li><a href="#">最新消息</a></li>
      <li><a href="#">獨家雷刻服務</a></li>
      <li><a href="#">購物商城</a></li>
      <li><a href="#">門市據點</a></li>
      <li><a href="#">樂活商店街</a></li>
    </ul>

    <a href="#" class="btn-primary nav-cta">會員專區</a>
  </nav>
</header>

<main>

<section class="hero-banner">
  <img src="images/hero-banner-engraving.jpg">
  <div class="hero-text">
    <h1>從名字到祝福，<br>這裡收藏每一份真實的刻圖故事。</h1>
    <p>看看大家把回憶、心意與重要的人，留在每天陪伴的眼鏡上。</p>
  </div>
</section>

<section class="filter-wrap">

  <div class="filter-top">
    <h2>找刻圖靈感</h2>
    <span id="countText">共 8 件作品</span>
  </div>

  <div class="filter-row">

    <select id="topicFilter">
      <option>全部作品</option>
      <option>愛情 / 情侶</option>
      <option>紀念日 / 日期</option>
      <option>名字 / 暱稱</option>
      <option>座右銘 / 文字</option>
      <option>圖案 / 插畫</option>
      <option>寵物 / 動物</option>
      <option>家庭 / 親子</option>
    </select>

    <select id="carrierFilter">
      <option>全部位置</option>
      <option>鏡片</option>
      <option>鏡框</option>
      <option>眼鏡布</option>
      <option>眼鏡盒</option>
      <option>鼻墊</option>
      <option>其他週邊配件</option>
    </select>

    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="搜尋名字、主題或作品">
    </div>

  </div>

</section>

<section class="gallery-grid" id="galleryGrid">

  <a href="#" class="card" data-topic="名字 / 暱稱" data-carrier="鏡片">
    <img src="images/lens-01.jpg">
    <div class="card-info">
      <span class="pill">名字 / 暱稱</span>
      <h3>名字刻圖</h3>
      <p>林＊姐</p>
    </div>
  </a>

  <a href="#" class="card" data-topic="愛情 / 情侶" data-carrier="鏡片">
    <img src="images/lens-01.jpg">
    <div class="card-info">
      <span class="pill">愛情 / 情侶</span>
      <h3>情侶刻圖</h3>
      <p>吳＊生</p>
    </div>
  </a>

  <a href="#" class="card" data-topic="圖案 / 插畫" data-carrier="眼鏡布">
    <img src="images/cloth-01.jpg">
    <div class="card-info">
      <span class="pill">圖案 / 插畫</span>
      <h3>我們的故事</h3>
      <p>陳＊姐</p>
    </div>
  </a>

  <a href="#" class="card" data-topic="家庭 / 親子" data-carrier="鏡片">
    <img src="images/lens-01.jpg">
    <div class="card-info">
      <span class="pill">家庭 / 親子</span>
      <h3>家人平安</h3>
      <p>李＊生</p>
    </div>
  </a>

</section>

</main>

<script>
const topicFilter = document.getElementById("topicFilter");
const carrierFilter = document.getElementById("carrierFilter");
const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");
const countText = document.getElementById("countText");

function filterCards(){
let count = 0;

cards.forEach(card=>{

const topic = card.dataset.topic;
const carrier = card.dataset.carrier;
const text = card.innerText.toLowerCase();

const match1 = topicFilter.value === "全部作品" || topic === topicFilter.value;
const match2 = carrierFilter.value === "全部位置" || carrier === carrierFilter.value;
const match3 = text.includes(searchInput.value.toLowerCase());

if(match1 && match2 && match3){
card.style.display="inline-block";
count++;
}else{
card.style.display="none";
}

});

countText.innerText = `共 ${count} 件作品`;
}

topicFilter.onchange = filterCards;
carrierFilter.onchange = filterCards;
searchInput.oninput = filterCards;
</script>

</body>
</html>
