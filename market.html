<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOHAS 刻圖市集 | 樂活眼鏡客製化服務</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="lohas-navbar">
        <div class="nav-container">
            <div class="logo">LOHAS 刻圖市集</div>
            <ul class="nav-links">
                <li><a href="#" class="active">全部</a></li>
                <li><a href="#">最新上架</a></li>
                <li><a href="#">熱門動物</a></li>
                <li><a href="#">質感文字</a></li>
            </ul>
            <div class="user-actions">
                <button class="btn-outline">我的收藏</button>
                <button class="btn-primary">登入</button>
            </div>
        </div>
    </nav>

    <header class="campaign-banner">
        <div class="banner-content">
            <h1>我的眼鏡我設計</h1>
            <p>立即挑選喜愛的刻圖，打造獨一無二的雷射雕刻眼鏡</p>
            <button class="btn-primary">開始創作</button>
        </div>
    </header>

    <main class="store-container">
        <div class="section-header">
            <h2>熱門社群原創刻圖</h2>
            <a href="#" class="see-all">顯示全部 ></a>
        </div>

        <div class="icon-grid">
            <div class="icon-card" onclick="openModal('月契之紋', '黃邦哲', 'https://via.placeholder.com/200/FAFAFA/8C7A6B?text=月', '那道紋印如月光沈落在肌膚上，宛若某種被遺忘的古老契約。')">
                <div class="badge hit">熱門 ❤️ 37</div>
                <div class="image-wrapper">
                    <img src="https://via.placeholder.com/200/FAFAFA/8C7A6B?text=月" alt="月契之紋">
                </div>
                <div class="card-info">
                    <h3 class="icon-title">月契之紋</h3>
                    <p class="designer-name">設計: 黃邦哲</p>
                </div>
            </div>

            <div class="icon-card" onclick="openModal('哭哭貓咪', '孫以丞', 'https://via.placeholder.com/200/FAFAFA/A9B89C?text=貓', '不哭不哭，眼淚是珍珠。')">
                <div class="badge new">New ✨</div>
                <div class="image-wrapper">
                    <img src="https://via.placeholder.com/200/FAFAFA/A9B89C?text=貓" alt="哭哭貓咪">
                </div>
                <div class="card-info">
                    <h3 class="icon-title">哭哭貓咪</h3>
                    <p class="designer-name">設計: 孫以丞</p>
                </div>
            </div>

            <div class="icon-card" onclick="openModal('迷路', '詹証閔', 'https://via.placeholder.com/200/FAFAFA/D98C8C?text=鹿', '聖誕節應景款，讓麋鹿陪伴你的視界。')">
                <div class="image-wrapper">
                    <img src="https://via.placeholder.com/200/FAFAFA/D98C8C?text=鹿" alt="迷路">
                </div>
                <div class="card-info">
                    <h3 class="icon-title">迷路 (聖誕款)</h3>
                    <p class="designer-name">設計: 詹証閔</p>
                </div>
            </div>

            </div>
    </main>

    <div id="iconModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <div class="modal-image">
                    <img id="modalImg" src="" alt="預覽圖">
                </div>
                <div class="modal-details">
                    <h2 id="modalTitle">標題</h2>
                    <p id="modalAuthor" class="designer-name">設計師</p>
                    <p id="modalDesc" class="description">描述文字...</p>
                    <div class="modal-actions">
                        <button class="btn-outline">加入收藏</button>
                        <button class="btn-primary">使用此圖</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
