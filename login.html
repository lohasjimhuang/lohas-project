<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOHAS 樂活眼鏡 - 會員登入</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
    :root {
        --lohas-brand-color: #50422D;
        --lohas-hover-color: #765F4A;
        --lohas-bg-warm: #F9F8F6;
        --lohas-text-light: #CDBEA2;
    }

    body {
        background: #fff;
        color: #333;
        font-family: "Noto Sans TC", sans-serif;
        margin: 0;
        min-height: 100vh;
    }

    /* 登入區塊樣式調整 */
    .input-lohas {
        border: 1px solid #e5e5e5;
        border-radius: 50px; /* 統一首頁圓角感 */
        padding: 12px 20px;
        width: 100%;
        background: #fafafa;
        transition: all 0.3s ease;
    }
    .input-lohas:focus {
        outline: none;
        border-color: var(--lohas-brand-color);
        background: #fff;
    }
    .btn-lohas {
        background: var(--lohas-brand-color);
        color: #fff;
        border-radius: 50px;
        padding: 12px 16px;
        width: 100%;
        font-weight: 500;
        letter-spacing: 2px;
        transition: background 0.3s ease;
    }
    .btn-lohas:hover {
        background: var(--lohas-hover-color);
    }

    /* 會員中心佈局：側邊欄無限延伸關鍵 */
    #profile-section {
        display: flex;
        min-height: 100vh;
        align-items: stretch; /* 讓子元素等高 */
    }

    /* 側邊欄延伸效果：利用偽元素背景或直接設定父層背景 */
    .sidebar-wrapper {
        width: 280px;
        background: var(--lohas-bg-warm);
        border-right: 1px solid #eee;
        flex-shrink: 0;
    }

    .main-content-wrapper {
        flex-grow: 1;
        padding: 60px 40px;
        background: #fff;
    }

    .nav-item-active {
    background: var(--lohas-brand-color) !important; /* 使用標準色 #50422D */
    color: #fff !important;
    font-weight: 500;
    box-shadow: 0 4px 12px rgba(80, 66, 45, 0.15);
}

    /* 調整一般選單項目的 Hover 效果，確保文字顏色一致 */
.sidebar-nav-link:hover:not(.nav-item-active) {
    background: #fff;
    color: var(--lohas-brand-color);
}

    .profile-card {
        background: #fff;
        border-radius: 12px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(80, 66, 45, 0.05);
        border: 1px solid var(--lohas-bg-warm);
    }

    .hidden { display: none !important; }

    @media (max-width: 768px) {
        #profile-section { flex-direction: column; }
        .sidebar-wrapper { width: 100%; border-right: none; border-bottom: 1px solid #eee; }
        .main-content-wrapper { padding: 30px 20px; }
    }
</style>
</head>

<body>

<div id="login-section" class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-10">
            <img src="images/lohas-logo.svg" alt="Lohas" class="h-10 mx-auto mb-6">
            <p class="text-sm text-gray-400 tracking-widest">MEMBER LOGIN</p>
        </div>

        <div class="space-y-5">
            <input type="text" id="account" class="input-lohas" placeholder="APP 帳號">
            <input type="text" id="mobile" class="input-lohas" placeholder="手機號碼">
            <input type="password" id="password" class="input-lohas" placeholder="密碼">
            <div id="error-msg" class="text-red-500 text-sm hidden text-center"></div>
            <button id="login-btn" class="btn-lohas">登入</button>
        </div>
    </div>
</div>

<div id="profile-section" class="hidden">
    
   <aside class="sidebar-wrapper">
    <div class="p-8 border-b border-gray-100">
        <p class="text-xs text-[#CDBEA2] tracking-widest uppercase mb-1">Member Center</p>
        <h2 class="text-xl font-bold text-[#50422D]">會員中心</h2>
    </div>
    <nav class="p-4">
        <ul class="space-y-2">
            <li>
                <a href="#" class="flex items-center px-6 py-4 text-sm font-medium rounded-xl transition-all nav-item-active">
                    會員總覽
                </a>
            </li>
            <li>
        <a href="gallery.html" class="sidebar-nav-link flex items-center px-6 py-4 text-sm font-medium text-[#50422D] rounded-xl transition-all">
            上傳分享作品
        </a>
    </li>
            <li>
                <a href="#" class="sidebar-nav-link flex items-center px-6 py-4 text-sm font-medium text-[#50422D] rounded-xl transition-all">
                    我的收藏
                </a>
            </li>
            <li>
                <a href="engraving.html" class="sidebar-nav-link flex items-center px-6 py-4 text-sm font-medium text-[#50422D] rounded-xl transition-all">
                    雷刻紀錄
                </a>
            </li>
            <li class="pt-8 mt-8 border-t border-gray-200/50">
                <button id="logout-btn-sidebar" class="flex items-center px-6 py-4 text-sm font-medium text-red-400 hover:text-red-600 w-full text-left transition-colors">
                    登出帳號
                </button>
            </li>
        </ul>
    </nav>
</aside>

    <main class="main-content-wrapper">
        <div class="max-w-4xl">
            <div class="mb-10">
                <h1 class="text-2xl font-bold tracking-[0.1em] text-[#50422D] mb-1 uppercase">會員基本資料</h1>
                
            </div>

            <div class="profile-card space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                    <div class="space-y-2 border-b border-gray-50 pb-4">
                        <span class="text-[#CDBEA2] text-xs uppercase tracking-widest font-bold">姓名</span>
                        <div id="profile-name" class="text-lg font-medium text-[#50422D]">-</div>
                    </div>
                    <div class="space-y-2 border-b border-gray-50 pb-4">
                        <span class="text-[#CDBEA2] text-xs uppercase tracking-widest font-bold">電話</span>
                        <div id="profile-mobile" class="text-lg font-medium text-[#50422D]">-</div>
                    </div>
                    <div class="space-y-2 border-b border-gray-50 pb-4">
                        <span class="text-[#CDBEA2] text-xs uppercase tracking-widest font-bold">信箱</span>
                        <div id="profile-email" class="text-lg font-medium text-[#50422D]">-</div>
                    </div>
                    <div class="space-y-2 border-b border-gray-50 pb-4">
                        <span class="text-[#CDBEA2] text-xs uppercase tracking-widest font-bold">生日</span>
                        <div id="profile-birthday" class="text-lg font-medium text-[#50422D]">-</div>
                    </div>
                </div>
                
                <div class="pt-6">
                    <button class="px-8 py-3 border border-[#50422D] text-[#50422D] text-sm font-medium hover:bg-[#50422D] hover:text-white transition-all rounded-full">
                        修改資料
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
const PROXY_URL = 'https://lohas-proxy.onrender.com/api';
const API_KEY = 'bfjY2jssj9dDajq0';
const API_VER = '0.1.0';

const loginBtn = document.getElementById('login-btn');
const errorMsg = document.getElementById('error-msg');
const loginSection = document.getElementById('login-section');
const profileSection = document.getElementById('profile-section');

function showError(msg){
  errorMsg.innerText = msg;
  errorMsg.classList.remove('hidden');
}

function clearError(){
  errorMsg.innerText = '';
  errorMsg.classList.add('hidden');
}

function setLoading(status){
  loginBtn.disabled = status;
  loginBtn.innerText = status ? '登入中...' : '登入';
}

loginBtn.addEventListener('click', login);

document.getElementById('password').addEventListener('keydown', e=>{
  if(e.key === 'Enter') login();
});

async function login(){
  const account = document.getElementById('account').value.trim();
  const mobile = document.getElementById('mobile').value.trim();
  const password = document.getElementById('password').value.trim();

  if(!account || !mobile || !password){
    showError('請輸入 APP帳號、手機號碼與密碼');
    return;
  }

  clearError();
  setLoading(true);

  try{
    const loginResponse = await fetch(`${PROXY_URL}/proxy/officialWed/login`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        data:{
          apikey:API_KEY,
          apiver:API_VER,
          data:{
            account:account,
            password:password
          }
        }
      })
    });

    const loginResult = await loginResponse.json();
    console.log('[登入結果]', loginResult);

    if(String(loginResult.code) !== '200'){
      showError(loginResult.message || loginResult.errmessage || '帳號或密碼錯誤');
      return;
    }

    const loginName =
      loginResult.data?.erpname ||
      loginResult.data?.erpName ||
      loginResult.data?.name ||
      '';

    await fetchProfileByMobile(mobile, loginName);

  }catch(err){
    console.error('[登入錯誤]', err);
    showError('連線失敗，請稍後再試');
  }finally{
    setLoading(false);
  }
}

async function fetchProfileByMobile(mobile, loginName){
  try{
    const profileResponse = await fetch(`${PROXY_URL}/proxy/member/list`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},

      /*
        這裡是這版的重點：
        member/list 也改成雙層 data 格式測試
      */
      body:JSON.stringify({
        data:{
          apikey:API_KEY,
          apiver:API_VER,
          data:{
            mobile:mobile
          }
        }
      })
    });

    const profileResult = await profileResponse.json();
    console.log('[會員資料]', profileResult);

    if(String(profileResult.code) !== '200' || !profileResult.data){
  showError('會員帳號與手機號碼不一致，請確認後再試');
  return;
}

    const member = profileResult.data;
    const memberName = member.name || '';

    if(loginName && memberName && loginName !== memberName){
      showError('會員帳號與手機號碼不一致，請確認後再試');
      console.warn('[姓名不一致]', {
        loginName: loginName,
        memberName: memberName
      });
      return;
    }

    document.getElementById('profile-name').innerText =
      member.name || loginName || '-';

    document.getElementById('profile-mobile').innerText =
      member.mobile || mobile || '-';

    document.getElementById('profile-email').innerText =
      member.email || '-';

    document.getElementById('profile-birthday').innerText =
      member.birthday || '-';

document.getElementById('profile-birthday').innerText =
  member.birthday || '-';


/* ===== 新增：登入成功寫入會員資料 ===== */
localStorage.setItem("lohasMember", JSON.stringify({
  erpid: member.client_id || null,
  name: member.name || loginName || '',
  mobile: member.mobile || mobile || ''
}));

const redirect =
  localStorage.getItem("redirectAfterLogin") || "login.html";

localStorage.removeItem("redirectAfterLogin");

/* 如果是從分享牆跳來登入，就跳回分享牆 */
if (redirect !== "login.html") {
  window.location.href = redirect;
  return;
}
/* ===== 新增結束 ===== */


loginSection.classList.add('hidden');
profileSection.classList.remove('hidden');
      
    loginSection.classList.add('hidden');
    profileSection.classList.remove('hidden');

  }catch(err){
    console.error('[會員資料錯誤]', err);
    showError('讀取會員資料失敗');
  }
}

document.getElementById('logout-btn').addEventListener('click', ()=>{
  location.reload();
});
// 登出邏輯：支援原本按鈕與側邊欄按鈕
const logoutBtns = [
  document.getElementById('logout-btn'),
  document.getElementById('logout-btn-sidebar')
];

logoutBtns.forEach(btn => {
  if (btn) {
    btn.addEventListener('click', () => {
      // 執行登出動作：重新整理頁面
      location.reload();
    });
  }
});

// 修改渲染預覽圖的函式
function renderPreview(container, imgSrc) {
    container.classList.add('has-image');
    
    // 插入圖片與叉叉按鈕
    container.innerHTML = `
        <img src="${imgSrc}" style="width:100%; height:100%; object-fit:cover; border-radius:12px;">
        <div class="delete-btn" onclick="removeImage(event, this)">
            <i class="fas fa-times"></i>
        </div>
    `;

    // 如果是主圖框，補回原本的「主圖」標籤
    if (container.classList.contains('main-upload')) {
        const badge = document.createElement('span');
        badge.className = 'badge-main';
        badge.innerText = '主圖';
        container.appendChild(badge);
    }
}

// 刪除圖片的函式
function removeImage(event, btn) {
    event.stopPropagation(); // 阻止觸發上傳框的點擊事件
    const container = btn.parentElement;
    
    container.classList.remove('has-image');
    
    // 恢復為原本的 + 號狀態
    if (container.classList.contains('main-upload')) {
        container.innerHTML = `
            <span class="badge-main">主圖</span>
            <div class="upload-placeholder">
                <i class="fas fa-plus"></i>
                <p>上傳主圖</p>
            </div>
        `;
    } else {
        container.innerHTML = `
            <div class="upload-placeholder">
                <i class="fas fa-plus"></i>
            </div>
        `;
    }
}
    
</script>

</body>
</html>
