<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOHAS 會員登入</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:#ffffff;
  color:#333;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
}
.input-gogoro{
  border:1px solid #e5e5e5;
  border-radius:8px;
  padding:14px 16px;
  width:100%;
  background:#fafafa;
}
.input-gogoro:focus{
  outline:none;
  border-color:#000;
  background:#fff;
}
.btn-gogoro{
  background:#000;
  color:#fff;
  border-radius:8px;
  padding:14px 16px;
  width:100%;
  font-weight:500;
  letter-spacing:2px;
}
.btn-gogoro:disabled{
  background:#ccc;
  cursor:not-allowed;
}
.hidden{
  display:none!important;
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<!-- 登入頁 -->
<div id="login-section" class="w-full max-w-sm">

  <div class="text-center mb-10">
    <h1 class="text-3xl font-bold tracking-[0.25em] mb-5">LOHAS</h1>
    <p class="text-sm text-gray-400 tracking-widest">會員登入</p>
  </div>

  <div class="space-y-5">
    <input
      type="text"
      id="account"
      class="input-gogoro"
      placeholder="手機號碼"
      autocomplete="username"
    >

    <input
      type="password"
      id="password"
      class="input-gogoro"
      placeholder="密碼"
      autocomplete="current-password"
    >

    <div id="error-msg" class="text-red-500 text-sm hidden text-center"></div>

    <button id="login-btn" class="btn-gogoro">
      登入
    </button>
  </div>

</div>

<!-- 會員資料 -->
<div id="profile-section" class="w-full max-w-md hidden">

  <div class="text-center mb-10">
    <h1 class="text-2xl font-bold tracking-[0.2em] mb-2">MEMBER PROFILE</h1>
    <p class="text-sm text-gray-400 tracking-wider">會員基本資料</p>
  </div>

  <div class="bg-white rounded-xl p-8 space-y-6 shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-gray-100">

    <div class="flex justify-between border-b border-gray-100 pb-4">
      <span class="text-gray-400 text-sm">姓名</span>
      <span id="profile-name">-</span>
    </div>

    <div class="flex justify-between border-b border-gray-100 pb-4">
      <span class="text-gray-400 text-sm">電話</span>
      <span id="profile-mobile">-</span>
    </div>

    <div class="flex justify-between border-b border-gray-100 pb-4">
      <span class="text-gray-400 text-sm">信箱</span>
      <span id="profile-email">-</span>
    </div>

    <div class="flex justify-between">
      <span class="text-gray-400 text-sm">生日</span>
      <span id="profile-birthday">-</span>
    </div>

  </div>

  <button
    id="logout-btn"
    class="w-full mt-10 py-3 text-sm text-gray-400 hover:text-black tracking-[0.2em]"
  >
    登出
  </button>

</div>

<script>
const PROXY_URL = 'https://lohas-proxy.onrender.com/api';
const API_KEY   = 'bfjY2jssj9dDajq0';
const API_VER   = '0.1.0';

const loginBtn       = document.getElementById('login-btn');
const errorMsg       = document.getElementById('error-msg');
const loginSection   = document.getElementById('login-section');
const profileSection = document.getElementById('profile-section');

function showError(msg){
  errorMsg.innerText = msg;
  errorMsg.classList.remove('hidden');
}

function clearError(){
  errorMsg.classList.add('hidden');
}

function setLoading(status){
  loginBtn.disabled = status;
  loginBtn.innerText = status
    ? '系統喚醒中...(免費版需30秒)'
    : '登入';
}

loginBtn.addEventListener('click', login);

document.getElementById('password').addEventListener('keydown', e=>{
  if(e.key === 'Enter') login();
});

async function login(){

  const mobile   = document.getElementById('account').value.trim();
  const password = document.getElementById('password').value.trim();

  if(!mobile || !password){
    showError('請輸入手機與密碼');
    return;
  }

  clearError();
  setLoading(true);

  try{

    // 第一步：登入驗證
    const response = await fetch(`${PROXY_URL}/proxy/officialWed/login`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        data:{
          apikey:API_KEY,
          apiver:API_VER,
          data:{
            account:mobile,
            password:password
          }
        }
      })
    });

    const result = await response.json();
    console.log('登入結果', result);

    if(String(result.code) !== '200'){
      showError(result.errmessage || '登入失敗');
      setLoading(false);
      return;
    }

    const fallbackName =
      result.data?.erpname ||
      result.data?.name ||
      '-';

    // 第二步：用手機查完整會員資料
    await fetchProfileByMobile(mobile, fallbackName);

  }catch(err){
    console.error(err);
    showError('連線失敗，請稍後再試');
  }

  setLoading(false);
}

async function fetchProfileByMobile(mobile, fallbackName){

  try{

    const response = await fetch(`${PROXY_URL}/proxy/member/list`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        apikey:API_KEY,
        apiver:API_VER,
        data:{
          mobile:mobile
        }
      })
    });

    const res = await response.json();
    console.log('會員資料', res);

    if(String(res.code) === '200' && res.data){

      const member = res.data;

      document.getElementById('profile-name').innerText =
        member.name || fallbackName || '-';

      document.getElementById('profile-mobile').innerText =
        member.mobile || mobile || '-';

      document.getElementById('profile-email').innerText =
        member.email || '-';

      document.getElementById('profile-birthday').innerText =
        member.birthday || '-';

    }else{

      // 查不到也至少顯示登入成功姓名
      document.getElementById('profile-name').innerText =
        fallbackName || '-';

      document.getElementById('profile-mobile').innerText =
        mobile || '-';

      document.getElementById('profile-email').innerText =
        '尚未取得';

      document.getElementById('profile-birthday').innerText =
        '尚未取得';
    }

    loginSection.classList.add('hidden');
    profileSection.classList.remove('hidden');

  }catch(err){

    document.getElementById('profile-name').innerText =
      fallbackName || '-';

    document.getElementById('profile-mobile').innerText =
      mobile || '-';

    document.getElementById('profile-email').innerText =
      '尚未取得';

    document.getElementById('profile-birthday').innerText =
      '尚未取得';

    loginSection.classList.add('hidden');
    profileSection.classList.remove('hidden');
  }
}

document.getElementById('logout-btn').addEventListener('click', ()=>{
  location.reload();
});
</script>

</body>
</html>
