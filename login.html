<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOHAS 會員登入</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:#fff;
  color:#333;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
}
.input-gogoro{
  border:1px solid #e5e5e5;
  border-radius:8px;
  padding:14px 16px;
  width:100%;
  background:#fafafa;
}
.input-gogoro:focus{
  outline:none;
  border-color:#000;
  background:#fff;
}
.btn-gogoro{
  background:#000;
  color:#fff;
  border-radius:8px;
  padding:14px 16px;
  width:100%;
  font-weight:500;
  letter-spacing:2px;
}
.btn-gogoro:disabled{
  background:#ccc;
  cursor:not-allowed;
}
.hidden{
  display:none!important;
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div id="login-section" class="w-full max-w-sm">
  <div class="text-center mb-10">
    <h1 class="text-3xl font-bold tracking-[0.25em] mb-5">LOHAS</h1>
    <p class="text-sm text-gray-400 tracking-widest">會員登入</p>
  </div>

  <div class="space-y-5">
    <input type="text" id="account" class="input-gogoro" placeholder="APP帳號">
    <input type="text" id="mobile" class="input-gogoro" placeholder="手機號碼">
    <input type="password" id="password" class="input-gogoro" placeholder="密碼">

    <div id="error-msg" class="text-red-500 text-sm hidden text-center"></div>

    <button id="login-btn" class="btn-gogoro">登入</button>
  </div>
</div>

<div id="profile-section" class="w-full max-w-5xl hidden flex flex-col md:flex-row gap-8 items-start">
  
  <aside class="w-full md:w-64 bg-white rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-gray-100 overflow-hidden">
    <div class="p-6 border-b border-gray-50">
      <p class="text-xs text-gray-400 tracking-widest uppercase">Member Center</p>
      <h2 class="text-lg font-bold text-gray-800 mt-1">會員中心</h2>
    </div>
    <nav class="p-2">
      <ul class="space-y-1">
        <li>
          <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-black bg-gray-50 rounded-lg transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            會員總覽
          </a>
        </li>
        <li>
          <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-gray-500 hover:text-black hover:bg-gray-50 rounded-lg transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
            我的收藏
          </a>
        </li>
        <li>
          <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-gray-500 hover:text-black hover:bg-gray-50 rounded-lg transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
            雷刻紀錄
          </a>
        </li>
        <li class="pt-4 mt-4 border-t border-gray-100">
          <button id="logout-btn-sidebar" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-red-400 hover:text-red-600 w-full text-left transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            登出
          </button>
        </li>
      </ul>
    </nav>
  </aside>

  <main class="flex-1 w-full">
    <div class="mb-8">
      <h1 class="text-2xl font-bold tracking-[0.1em] mb-1">MEMBER PROFILE</h1>
      <p class="text-sm text-gray-400 tracking-wider">會員基本資料</p>
    </div>

    <div class="bg-white rounded-xl p-8 space-y-6 shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-gray-100">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="space-y-1 border-b border-gray-50 pb-4">
          <span class="text-gray-400 text-xs uppercase tracking-widest">姓名</span>
          <div id="profile-name" class="text-lg font-medium text-gray-800">-</div>
        </div>
        <div class="space-y-1 border-b border-gray-50 pb-4">
          <span class="text-gray-400 text-xs uppercase tracking-widest">電話</span>
          <div id="profile-mobile" class="text-lg font-medium text-gray-800">-</div>
        </div>
        <div class="space-y-1 border-b border-gray-50 pb-4">
          <span class="text-gray-400 text-xs uppercase tracking-widest">信箱</span>
          <div id="profile-email" class="text-lg font-medium text-gray-800">-</div>
        </div>
        <div class="space-y-1 border-b border-gray-50 pb-4">
          <span class="text-gray-400 text-xs uppercase tracking-widest">生日</span>
          <div id="profile-birthday" class="text-lg font-medium text-gray-800">-</div>
        </div>
      </div>
      
      <div class="pt-6">
        <button class="px-6 py-2 border border-black text-sm hover:bg-black hover:text-white transition-all rounded-lg">
          修改資料
        </button>
      </div>
    </div>
  </main>
</div>

<script>
const PROXY_URL = 'https://lohas-proxy.onrender.com/api';
const API_KEY = 'bfjY2jssj9dDajq0';
const API_VER = '0.1.0';

const loginBtn = document.getElementById('login-btn');
const errorMsg = document.getElementById('error-msg');
const loginSection = document.getElementById('login-section');
const profileSection = document.getElementById('profile-section');

function showError(msg){
  errorMsg.innerText = msg;
  errorMsg.classList.remove('hidden');
}

function clearError(){
  errorMsg.innerText = '';
  errorMsg.classList.add('hidden');
}

function setLoading(status){
  loginBtn.disabled = status;
  loginBtn.innerText = status ? '登入中...' : '登入';
}

loginBtn.addEventListener('click', login);

document.getElementById('password').addEventListener('keydown', e=>{
  if(e.key === 'Enter') login();
});

async function login(){
  const account = document.getElementById('account').value.trim();
  const mobile = document.getElementById('mobile').value.trim();
  const password = document.getElementById('password').value.trim();

  if(!account || !mobile || !password){
    showError('請輸入 APP帳號、手機號碼與密碼');
    return;
  }

  clearError();
  setLoading(true);

  try{
    const loginResponse = await fetch(`${PROXY_URL}/proxy/officialWed/login`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        data:{
          apikey:API_KEY,
          apiver:API_VER,
          data:{
            account:account,
            password:password
          }
        }
      })
    });

    const loginResult = await loginResponse.json();
    console.log('[登入結果]', loginResult);

    if(String(loginResult.code) !== '200'){
      showError(loginResult.message || loginResult.errmessage || '帳號或密碼錯誤');
      return;
    }

    const loginName =
      loginResult.data?.erpname ||
      loginResult.data?.erpName ||
      loginResult.data?.name ||
      '';

    await fetchProfileByMobile(mobile, loginName);

  }catch(err){
    console.error('[登入錯誤]', err);
    showError('連線失敗，請稍後再試');
  }finally{
    setLoading(false);
  }
}

async function fetchProfileByMobile(mobile, loginName){
  try{
    const profileResponse = await fetch(`${PROXY_URL}/proxy/member/list`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},

      /*
        這裡是這版的重點：
        member/list 也改成雙層 data 格式測試
      */
      body:JSON.stringify({
        data:{
          apikey:API_KEY,
          apiver:API_VER,
          data:{
            mobile:mobile
          }
        }
      })
    });

    const profileResult = await profileResponse.json();
    console.log('[會員資料]', profileResult);

    if(String(profileResult.code) !== '200' || !profileResult.data){
  showError('會員帳號與手機號碼不一致，請確認後再試');
  return;
}

    const member = profileResult.data;
    const memberName = member.name || '';

    if(loginName && memberName && loginName !== memberName){
      showError('會員帳號與手機號碼不一致，請確認後再試');
      console.warn('[姓名不一致]', {
        loginName: loginName,
        memberName: memberName
      });
      return;
    }

    document.getElementById('profile-name').innerText =
      member.name || loginName || '-';

    document.getElementById('profile-mobile').innerText =
      member.mobile || mobile || '-';

    document.getElementById('profile-email').innerText =
      member.email || '-';

    document.getElementById('profile-birthday').innerText =
      member.birthday || '-';

    loginSection.classList.add('hidden');
    profileSection.classList.remove('hidden');

  }catch(err){
    console.error('[會員資料錯誤]', err);
    showError('讀取會員資料失敗');
  }
}

document.getElementById('logout-btn').addEventListener('click', ()=>{
  location.reload();
});
// 登出邏輯：支援原本按鈕與側邊欄按鈕
const logoutBtns = [
  document.getElementById('logout-btn'),
  document.getElementById('logout-btn-sidebar')
];

logoutBtns.forEach(btn => {
  if (btn) {
    btn.addEventListener('click', () => {
      // 執行登出動作：重新整理頁面
      location.reload();
    });
  }
});
  
</script>

</body>
</html>
