<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOHAS 會員登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Gogoro 風格：乾淨、黑白灰、極簡 */
    body { 
      background-color: #ffffff; 
      color: #333333; 
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
    }
    .input-gogoro { 
      border: 1px solid #e5e5e5; 
      border-radius: 8px; 
      padding: 14px 16px; 
      width: 100%; 
      transition: border-color 0.3s; 
      background-color: #fafafa;
    }
    .input-gogoro:focus { 
      outline: none; 
      border-color: #000000; 
      background-color: #ffffff;
    }
    .btn-gogoro { 
      background-color: #000000; 
      color: #ffffff; 
      border-radius: 8px; 
      padding: 14px 16px; 
      width: 100%; 
      font-weight: 500; 
      letter-spacing: 2px;
      transition: background-color 0.3s; 
    }
    .btn-gogoro:hover:not(:disabled) { 
      background-color: #333333; 
    }
    .btn-gogoro:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div id="login-section" class="w-full max-w-sm">
    <div class="text-center mb-10">
      <img src="images/lohas-logo.svg" alt="LOHAS" class="mx-auto h-8 mb-6" onerror="this.style.display='none'; document.getElementById('logo-text').classList.remove('hidden');">
      <h1 id="logo-text" class="text-3xl font-bold tracking-[0.2em] mb-6 hidden">LOHAS</h1>
      <h2 class="text-sm font-medium text-gray-400 tracking-wider">登入您的會員帳號</h2>
    </div>
    
    <div class="space-y-5">
      <div>
        <input type="text" id="account" class="input-gogoro" placeholder="帳號">
      </div>
      <div>
        <input type="password" id="password" class="input-gogoro" placeholder="密碼">
      </div>
      <div id="error-msg" class="text-red-500 text-sm hidden text-center"></div>
      <button id="login-btn" class="btn-gogoro mt-2">登入</button>
    </div>
  </div>

  <div id="profile-section" class="w-full max-w-md hidden">
    <div class="text-center mb-10">
      <h1 class="text-2xl font-bold tracking-[0.2em] mb-2">MEMBER PROFILE</h1>
      <h2 class="text-sm text-gray-400 tracking-wider">會員基本資料</h2>
    </div>
    
    <div class="bg-white rounded-xl p-8 space-y-6 shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-gray-100">
      <div class="flex justify-between items-center border-b border-gray-100 pb-4">
        <span class="text-gray-400 text-sm tracking-widest">姓名</span>
        <span id="profile-name" class="font-medium text-gray-800 tracking-wide">-</span>
      </div>
      <div class="flex justify-between items-center border-b border-gray-100 pb-4">
        <span class="text-gray-400 text-sm tracking-widest">電話</span>
        <span id="profile-mobile" class="font-medium text-gray-800 tracking-wide">-</span>
      </div>
      <div class="flex justify-between items-center border-b border-gray-100 pb-4">
        <span class="text-gray-400 text-sm tracking-widest">信箱</span>
        <span id="profile-email" class="font-medium text-gray-800 tracking-wide">-</span>
      </div>
      <div class="flex justify-between items-center pb-2">
        <span class="text-gray-400 text-sm tracking-widest">生日</span>
        <span id="profile-birthday" class="font-medium text-gray-800 tracking-wide">-</span>
      </div>
    </div>
    
    <button id="logout-btn" class="w-full mt-10 py-3 text-sm font-bold text-gray-400 tracking-[0.2em] hover:text-black transition-colors">登出</button>
  </div>

 <script>
// 1. 基礎設定
const PROXY_URL = 'https://lohas-proxy.onrender.com/api'; 
const API_KEY = 'ch856m30xangih8r';
const API_VER = '0.1.0';

const loginBtn = document.getElementById('login-btn');
const errorMsg = document.getElementById('error-msg');

// 顯示與隱藏警示語 (確保 CSS 中有 .hidden { display: none !important; })
function showError(msg) {
    errorMsg.innerText = msg;
    errorMsg.classList.remove('hidden');
}

function hideError() {
    errorMsg.classList.add('hidden');
}

// 2. 登入主邏輯
// 登入邏輯修正
loginBtn.addEventListener('click', async () => {
    const account = document.getElementById('account').value.trim();
    const password = document.getElementById('password').value.trim();
    
    if (!account || !password) {
        showError('請輸入帳號與密碼');
        return;
    }

    hideError(); 
    loginBtn.innerText = '驗證中...';
    loginBtn.disabled = true;

    try {
        // 解決 051 錯誤的關鍵：產生 YYYY-MM 格式
        const currentMonth = new Date().toISOString().slice(0, 7); 

        const response = await fetch(`${PROXY_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                data: {
                    apikey: API_KEY,
                    apiver: API_VER,
                    data: { 
                        account: account, 
                        password: password,
                        month: currentMonth // 補上後端強制要求的月份欄位
                    }
                }
            })
        });

        const result = await response.json();
        
        // 兼容多種回傳格式
        const status = result.code || result.data?.code;
        const info = result.data?.data || result.data || result;

        if (status === "200") {
            alert('登入成功！');
            // 抓取 ERPID 並呼叫 memberList API 取得姓名、生日、信箱
            const erpid = info.erpid || result.erpid;
            fetchProfile(erpid); 
        } else {
            // 如果還是失敗，顯示後端給的具體原因
            showError(result.errmessage || result.message || '登入失敗');
        }
    } catch (err) {
        showError('系統連線異常，請檢查 Proxy 狀態');
    } finally {
        loginBtn.innerText = '登入';
        loginBtn.disabled = false;
    }
});

// 真正拿「姓名、生日、信箱」的 API
async function fetchProfile(erpid) {
    try {
        const response = await fetch(`${PROXY_URL}/memberList`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                data: {
                    apikey: API_KEY,
                    apiver: API_VER,
                    data: { client_id: erpid }
                }
            })
        });

        const res = await response.json();
        const member = res.data?.data || res.data;

        if (member) {
            // 這裡就是你要的資料
            document.getElementById('profile-name').innerText = member.name;     // 姓名
            document.getElementById('profile-birthday').innerText = member.birthday; // 生日
            document.getElementById('profile-email').innerText = member.email;   // 信箱
            document.getElementById('profile-mobile').innerText = member.mobile; // 電話

            loginSection.classList.add('hidden');
            profileSection.classList.remove('hidden');
        }
    } catch (err) {
        showError('讀取會員詳情失敗');
    }
}

// 4. 登出
document.getElementById('logout-btn').addEventListener('click', () => {
    location.reload(); 
});
</script>
</body>
</html>
