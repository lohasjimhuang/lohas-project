
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOHAS 會員登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Gogoro 風格：乾淨、黑白灰、極簡 */
    body { 
      background-color: #ffffff; 
      color: #333333; 
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
    }
    .input-gogoro { 
      border: 1px solid #e5e5e5; 
      border-radius: 8px; 
      padding: 14px 16px; 
      width: 100%; 
      transition: border-color 0.3s; 
      background-color: #fafafa;
    }
    .input-gogoro:focus { 
      outline: none; 
      border-color: #000000; 
      background-color: #ffffff;
    }
    .btn-gogoro { 
      background-color: #000000; 
      color: #ffffff; 
      border-radius: 8px; 
      padding: 14px 16px; 
      width: 100%; 
      font-weight: 500; 
      letter-spacing: 2px;
      transition: background-color 0.3s; 
    }
    .btn-gogoro:hover:not(:disabled) { 
      background-color: #333333; 
    }
    .btn-gogoro:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div id="login-section" class="w-full max-w-sm">
    <div class="text-center mb-10">
      <img src="images/lohas-logo.svg" alt="LOHAS" class="mx-auto h-8 mb-6" onerror="this.style.display='none'; document.getElementById('logo-text').classList.remove('hidden');">
      <h1 id="logo-text" class="text-3xl font-bold tracking-[0.2em] mb-6 hidden">LOHAS</h1>
      <h2 class="text-sm font-medium text-gray-400 tracking-wider">登入您的會員帳號</h2>
    </div>
    
    <div class="space-y-5">
      <div>
        <input type="text" id="account" class="input-gogoro" placeholder="帳號">
      </div>
      <div>
        <input type="password" id="password" class="input-gogoro" placeholder="密碼">
      </div>
      <div id="error-msg" class="text-red-500 text-sm hidden text-center"></div>
      <button id="login-btn" class="btn-gogoro mt-2">登入</button>
    </div>
  </div>

  <div id="profile-section" class="w-full max-w-md hidden">
    <div class="text-center mb-10">
      <h1 class="text-2xl font-bold tracking-[0.2em] mb-2">MEMBER PROFILE</h1>
      <h2 class="text-sm text-gray-400 tracking-wider">會員基本資料</h2>
    </div>
    
    <div class="bg-white rounded-xl p-8 space-y-6 shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-gray-100">
      <div class="flex justify-between items-center border-b border-gray-100 pb-4">
        <span class="text-gray-400 text-sm tracking-widest">姓名</span>
        <span id="profile-name" class="font-medium text-gray-800 tracking-wide">-</span>
      </div>
      <div class="flex justify-between items-center border-b border-gray-100 pb-4">
        <span class="text-gray-400 text-sm tracking-widest">電話</span>
        <span id="profile-mobile" class="font-medium text-gray-800 tracking-wide">-</span>
      </div>
      <div class="flex justify-between items-center border-b border-gray-100 pb-4">
        <span class="text-gray-400 text-sm tracking-widest">信箱</span>
        <span id="profile-email" class="font-medium text-gray-800 tracking-wide">-</span>
      </div>
      <div class="flex justify-between items-center pb-2">
        <span class="text-gray-400 text-sm tracking-widest">生日</span>
        <span id="profile-birthday" class="font-medium text-gray-800 tracking-wide">-</span>
      </div>
    </div>
    
    <button id="logout-btn" class="w-full mt-10 py-3 text-sm font-bold text-gray-400 tracking-[0.2em] hover:text-black transition-colors">登出</button>
  </div>

<script>
// 1. 基礎設定
// 請確保此網址與您 Render Dashboard 顯示的網址一致（結尾不要多餘的斜線）
const PROXY_URL = 'https://lohas-proxy.onrender.com/api'; 
const API_KEY = 'ch856m30xangih8r'; // 測試站專用 Key
const API_VER = '0.1.0';

const loginBtn = document.getElementById('login-btn');
const errorMsg = document.getElementById('error-msg');
const loginSection = document.getElementById('login-section');
const profileSection = document.getElementById('profile-section');

function showError(msg) {
    errorMsg.innerText = msg;
    errorMsg.classList.remove('hidden');
}

function hideError() {
    errorMsg.classList.add('hidden');
}

// 2. 登入主邏輯
loginBtn.addEventListener('click', async () => {
    const account = document.getElementById('account').value.trim();
    const password = document.getElementById('password').value.trim();
    
    if (!account || !password) {
        showError('請輸入帳號與密碼');
        return;
    }

    hideError(); 
    loginBtn.innerText = '系統喚醒中...'; // 免費版喚醒提示
    loginBtn.disabled = true;

    try {
        // 正確路徑：officialWed/login [cite: 981-982]
        // 正確結構：apikey 和 apiver 必須在第一層 
        const response = await fetch(`${PROXY_URL}/proxy/officialWed/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                apiver: API_VER,
                apikey: API_KEY,
                data: { 
                    account: account, 
                    password: password 
                }
            })
        });

        if (!response.ok) {
            showError(`伺服器連線失敗 (${response.status})`);
            return;
        }

        const result = await response.json();
        
        // 判斷狀態碼（注意：API 有時回傳字串 "200"）
        if (String(result.code) === "200") {
            const erpid = result.data?.erpid;
            
            if (erpid) {
                await fetchProfile(erpid); 
            } else {
                showError('登入成功但找不到會員客編');
            }
        } else {
            // 顯示 API 回傳的具體錯誤訊息 [cite: 905]
            showError(result.errmessage || result.message || `錯誤代碼: ${result.code}`);
        }
    } catch (err) {
        console.error('Login Error:', err);
        showError('連線超時，請稍後再試（伺服器喚醒中）');
    } finally {
        loginBtn.innerText = '登入';
        loginBtn.disabled = false;
    }
});

// 3. 取得會員詳細資料
async function fetchProfile(erpid) {
    try {
        // 正確路徑：member/list [cite: 52]
        const response = await fetch(`${PROXY_URL}/proxy/member/list`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                apiver: API_VER,
                apikey: API_KEY,
                data: { client_id: erpid } // 使用 client_id 查詢 [cite: 54]
            })
        });

        const res = await response.json();
        const member = res.data; // 會員資料物件 [cite: 69-74]

        if (String(res.code) === "200" && member) {
            document.getElementById('profile-name').innerText = member.name || '-';
            document.getElementById('profile-birthday').innerText = member.birthday || '-';
            document.getElementById('profile-email').innerText = member.email || '-';
            document.getElementById('profile-mobile').innerText = member.mobile || '-';

            loginSection.classList.add('hidden');
            profileSection.classList.remove('hidden');
        } else {
            showError('讀取詳情失敗');
        }
    } catch (err) {
        showError('資料讀取異常');
    }
}

document.getElementById('logout-btn').addEventListener('click', () => {
    location.reload(); 
});
</script>
</body>
</html>
