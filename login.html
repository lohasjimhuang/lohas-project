<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員中心 | LOHAS 樂活眼鏡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8f8f8;
            color: #333;
        }
        .lohas-gradient {
            background: linear-gradient(135deg, #1a1a1a 0%, #333333 100%);
        }
        .loading-spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        input:focus {
            outline: none;
            border-color: #1a1a1a;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="login-section" class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="p-8 pt-12">
            <div class="text-center mb-10">
                <h1 class="text-2xl font-bold tracking-widest text-neutral-800">LOHAS</h1>
                <p class="text-neutral-400 text-sm mt-2">請登入您的會員帳號</p>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-medium text-neutral-500 mb-1 ml-1">APP 帳號</label>
                    <input type="text" id="app_account" placeholder="請輸入帳號" 
                           class="w-full px-5 py-4 bg-neutral-50 border border-neutral-100 rounded-2xl text-sm transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-neutral-500 mb-1 ml-1">手機號碼</label>
                    <input type="text" id="mobile" placeholder="請輸入手機號碼" 
                           class="w-full px-5 py-4 bg-neutral-50 border border-neutral-100 rounded-2xl text-sm transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-neutral-500 mb-1 ml-1">密碼</label>
                    <input type="password" id="password" placeholder="請輸入密碼" 
                           class="w-full px-5 py-4 bg-neutral-50 border border-neutral-100 rounded-2xl text-sm transition-all">
                </div>

                <button id="login-btn" onclick="login()" 
                        class="w-full py-4 mt-4 lohas-gradient text-white text-sm font-medium tracking-widest rounded-2xl shadow-lg hover:opacity-90 transition-all active:scale-[0.98]">
                    登入帳號
                </button>
            </div>

            <div id="error-message" class="mt-6 text-center text-red-400 text-xs min-h-[1em]"></div>
        </div>
        <div class="bg-neutral-50 py-6 text-center">
            <a href="#" class="text-xs text-neutral-400 hover:text-neutral-600 transition">忘記密碼？</a>
        </div>
    </div>

    <div id="profile-section" class="hidden w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="lohas-gradient p-10 text-white text-center">
            <div class="w-24 h-24 bg-white/10 backdrop-blur-md rounded-full mx-auto mb-5 flex items-center justify-center text-3xl font-light border border-white/20">
                <span id="user-initial">L</span>
            </div>
            <h2 id="display-name" class="text-2xl font-medium tracking-wider">會員姓名</h2>
            <p id="display-mobile" class="text-neutral-400 text-sm mt-2">0900-000-000</p>
        </div>

        <div class="p-8 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="p-5 bg-neutral-50 rounded-2xl border border-neutral-100 text-center group hover:bg-neutral-100 transition-all cursor-pointer">
                    <div class="text-[10px] uppercase tracking-widest text-neutral-400 mb-1">配鏡紀錄</div>
                    <div class="font-medium text-neutral-800">1 筆</div>
                </div>
                <div class="p-5 bg-neutral-50 rounded-2xl border border-neutral-100 text-center group hover:bg-neutral-100 transition-all cursor-pointer">
                    <div class="text-[10px] uppercase tracking-widest text-neutral-400 mb-1">剩餘點數</div>
                    <div class="font-medium text-neutral-800">150 P</div>
                </div>
            </div>

            <div class="space-y-4 pt-2">
                <div class="flex justify-between items-center px-2">
                    <span class="text-sm text-neutral-400">電子信箱</span>
                    <span id="display-email" class="text-sm font-medium text-neutral-800">---</span>
                </div>
                <div class="flex justify-between items-center px-2">
                    <span class="text-sm text-neutral-400">出生日期</span>
                    <span id="display-birthday" class="text-sm font-medium text-neutral-800">---</span>
                </div>
            </div>

            <div class="pt-4 space-y-3">
                <button class="w-full py-4 text-sm font-medium tracking-widest bg-neutral-800 text-white rounded-2xl hover:bg-neutral-900 transition-all">
                    修改基本資料
                </button>
                <button onclick="logout()" class="w-full py-4 text-sm font-medium tracking-widest text-neutral-400 hover:text-red-400 transition-all">
                    登出帳號
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://lohas-proxy.onrender.com/api';
        const API_VERSION = '0.1.0';
        const API_KEY = 'bfjY2jssj9dDajq0';

        async function login() {
            const appAccount = document.getElementById('app_account').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('error-message');

            if (!appAccount || !mobile || !password) {
                errorDiv.innerText = '請填寫所有欄位';
                return;
            }

            // UI 狀態更新
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> 登入中...';
            errorDiv.innerText = '';

            try {
                // 1. 執行登入驗證
                const loginResponse = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        version: API_VERSION,
                        key: API_KEY,
                        app_account: appAccount,
                        password: password
                    })
                });

                const loginResult = await loginResponse.json();

                if (loginResult.code !== 200) {
                    throw new Error(loginResult.msg || '登入失敗');
                }

                // 2. 獲取完整會員資料並比對手機號碼
                const profileResult = await fetchProfileByMobile(mobile);
                
                // 比對登入帳號名稱與手機查詢名稱
                if (profileResult.name !== loginResult.data.erpname) {
                    throw new Error('會員帳號與手機號碼不一致');
                }

                // 3. 登入成功，更新介面
                showProfile(profileResult);

            } catch (error) {
                errorDiv.innerText = error.message;
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerText = '登入帳號';
            }
        }

        async function fetchProfileByMobile(mobile) {
            const response = await fetch(`${API_URL}/member_list`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    version: API_VERSION,
                    key: API_KEY,
                    mobile: mobile
                })
            });

            const result = await response.json();

            if (result.code === 200 && result.data && result.data.length > 0) {
                return result.data[0];
            } else {
                throw new Error('查無會員資料');
            }
        }

        function showProfile(data) {
            document.getElementById('display-name').innerText = data.name;
            document.getElementById('display-mobile').innerText = data.mobile;
            document.getElementById('display-email').innerText = data.email || '尚未設定';
            document.getElementById('display-birthday').innerText = data.birthday || '尚未設定';
            
            if(data.name) {
                document.getElementById('user-initial').innerText = data.name.charAt(0);
            }

            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('profile-section').classList.remove('hidden');
        }

        function logout() {
            if(confirm('確定要登出嗎？')) {
                location.reload();
            }
        }

        // 支援 Enter 鍵登入
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !document.getElementById('login-section').classList.contains('hidden')) {
                login();
            }
        });
    </script>
</body>
</html>
