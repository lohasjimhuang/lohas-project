<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOHAS 樂活眼鏡 - 會員登入</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
    :root {
        --lohas-brand-color: #50422D;
        --lohas-hover-color: #765F4A;
        --lohas-bg-warm: #F9F8F6;
        --lohas-text-light: #CDBEA2;
    }

    body {
        background: #fff;
        color: #333;
        font-family: "Noto Sans TC", sans-serif;
        margin: 0;
        min-height: 100vh;
    }

    /* 登入區塊樣式調整 */
    .input-lohas {
        border: 1px solid #e5e5e5;
        border-radius: 50px; /* 統一首頁圓角感 */
        padding: 12px 20px;
        width: 100%;
        background: #fafafa;
        transition: all 0.3s ease;
    }
    .input-lohas:focus {
        outline: none;
        border-color: var(--lohas-brand-color);
        background: #fff;
    }
    .btn-lohas {
        background: var(--lohas-brand-color);
        color: #fff;
        border-radius: 50px;
        padding: 12px 16px;
        width: 100%;
        font-weight: 500;
        letter-spacing: 2px;
        transition: background 0.3s ease;
    }
    .btn-lohas:hover {
        background: var(--lohas-hover-color);
    }

    /* 會員中心佈局：側邊欄無限延伸關鍵 */
    #profile-section {
        display: flex;
        min-height: 100vh;
        align-items: stretch; /* 讓子元素等高 */
    }

    /* 側邊欄延伸效果：利用偽元素背景或直接設定父層背景 */
    .sidebar-wrapper {
        width: 280px;
        background: var(--lohas-bg-warm);
        border-right: 1px solid #eee;
        flex-shrink: 0;
    }

    .main-content-wrapper {
        flex-grow: 1;
        padding: 60px 40px;
        background: #fff;
    }

    .nav-item-active {
        background: #fff;
        color: var(--lohas-brand-color);
        font-weight: 700;
        box-shadow: 0 4px 12px rgba(80, 66, 45, 0.05);
    }

    .profile-card {
        background: #fff;
        border-radius: 12px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(80, 66, 45, 0.05);
        border: 1px solid var(--lohas-bg-warm);
    }

    .hidden { display: none !important; }

    @media (max-width: 768px) {
        #profile-section { flex-direction: column; }
        .sidebar-wrapper { width: 100%; border-right: none; border-bottom: 1px solid #eee; }
        .main-content-wrapper { padding: 30px 20px; }
    }
</style>
</head>

<body>

<div id="login-section" class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-10">
            <img src="images/lohas-logo.svg" alt="Lohas" class="h-10 mx-auto mb-6">
            <p class="text-sm text-gray-400 tracking-widest">MEMBER LOGIN</p>
        </div>

        <div class="space-y-5">
            <input type="text" id="account" class="input-lohas" placeholder="APP 帳號">
            <input type="text" id="mobile" class="input-lohas" placeholder="手機號碼">
            <input type="password" id="password" class="input-lohas" placeholder="密碼">
            <div id="error-msg" class="text-red-500 text-sm hidden text-center"></div>
            <button id="login-btn" class="btn-lohas">登入</button>
        </div>
    </div>
</div>

<div id="profile-section" class="hidden">
    
    <aside class="sidebar-wrapper">
        <div class="p-8 border-b border-gray-100">
            <p class="text-xs text-[#CDBEA2] tracking-widest uppercase mb-1">Member Center</p>
            <h2 class="text-xl font-bold text-[#50422D]">會員中心</h2>
        </div>
        <nav class="p-4">
            <ul class="space-y-2">
                <li>
                    <a href="#" class="flex items-center gap-3 px-6 py-4 text-sm font-medium rounded-xl transition-all nav-item-active">
                        <i class="fa-solid fa-user"></i> 會員總覽
                    </a>
                </li>
                <li>
                    <a href="#" class="flex items-center gap-3 px-6 py-4 text-sm font-medium text-[#50422D] hover:bg-white/50 rounded-xl transition-all">
                        <i class="fa-solid fa-heart"></i> 我的收藏
                    </a>
                </li>
                <li>
                    <a href="engraving.html" class="flex items-center gap-3 px-6 py-4 text-sm font-medium text-[#50422D] hover:bg-white/50 rounded-xl transition-all">
                        <i class="fa-solid fa-pen-nib"></i> 雷刻紀錄
                    </a>
                </li>
                <li class="pt-8 mt-8 border-t border-gray-200/50">
                    <button id="logout-btn-sidebar" class="flex items-center gap-3 px-6 py-4 text-sm font-medium text-red-400 hover:text-red-600 w-full text-left transition-colors">
                        <i class="fa-solid fa-right-from-bracket"></i> 登出帳號
                    </button>
                </li>
            </ul>
        </nav>
    </aside>

    <main class="main-content-wrapper">
        <div class="max-w-4xl">
            <div class="mb-10">
                <h1 class="text-2xl font-bold tracking-[0.1em] text-[#50422D] mb-1 uppercase">Member Profile</h1>
                <p class="text-sm text-[#CDBEA2] tracking-wider">會員基本資料</p>
            </div>

            <div class="profile-card space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                    <div class="space-y-2 border-b border-gray-50 pb-4">
                        <span class="text-[#CDBEA2] text-xs uppercase tracking-widest font-bold">姓名</span>
                        <div id="profile-name" class="text-lg font-medium text-[#50422D]">-</div>
                    </div>
                    <div class="space-y-2 border-b border-gray-50 pb-4">
                        <span class="text-[#CDBEA2] text-xs uppercase tracking-widest font-bold">電話</span>
                        <div id="profile-mobile" class="text-lg font-medium text-[#50422D]">-</div>
                    </div>
                    <div class="space-y-2 border-b border-gray-50 pb-4">
                        <span class="text-[#CDBEA2] text-xs uppercase tracking-widest font-bold">信箱</span>
                        <div id="profile-email" class="text-lg font-medium text-[#50422D]">-</div>
                    </div>
                    <div class="space-y-2 border-b border-gray-50 pb-4">
                        <span class="text-[#CDBEA2] text-xs uppercase tracking-widest font-bold">生日</span>
                        <div id="profile-birthday" class="text-lg font-medium text-[#50422D]">-</div>
                    </div>
                </div>
                
                <div class="pt-6">
                    <button class="px-8 py-3 border border-[#50422D] text-[#50422D] text-sm font-medium hover:bg-[#50422D] hover:text-white transition-all rounded-full">
                        修改資料
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // 1. 統一登出邏輯：清除資料、切換 UI 並清空表單
    function handleLogout() {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('userData');
        localStorage.removeItem('userAccount');
        
        // 切換回登入畫面
        document.getElementById('profile-section').classList.add('hidden');
        document.getElementById('login-section').classList.remove('hidden');
        
        // 清空密碼欄位以示安全
        document.getElementById('password').value = '';
        document.getElementById('error-msg').classList.add('hidden');
        
        console.log('User logged out successfully.');
    }

    // 2. 登入成功後的 UI 渲染邏輯
    function showUserProfile(data) {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('profile-section').classList.remove('hidden');
        
        // 渲染會員資料 (對應您新版 HTML 的 ID)
        document.getElementById('profile-name').textContent = data.Name || '未提供';
        document.getElementById('profile-mobile').textContent = data.Mobile || '未提供';
        document.getElementById('profile-email').textContent = data.Email || '未提供';
        document.getElementById('profile-birthday').textContent = data.Birthday || '未提供';
    }

    document.addEventListener('DOMContentLoaded', () => {
        const loginBtn = document.getElementById('login-btn');
        const logoutBtnSidebar = document.getElementById('logout-btn-sidebar');
        const errorMsg = document.getElementById('error-msg');

        // A. 檢查初始登入狀態
        const savedData = localStorage.getItem('userData');
        if (localStorage.getItem('isLoggedIn') === 'true' && savedData) {
            showUserProfile(JSON.parse(savedData));
        }

        // B. 登入按鈕點擊事件 (原本的 API 串接邏輯)
        if (loginBtn) {
            loginBtn.addEventListener('click', () => {
                const account = document.getElementById('account').value;
                const mobile = document.getElementById('mobile').value;
                const password = document.getElementById('password').value;

                if (!account || !mobile || !password) {
                    errorMsg.textContent = '請填寫所有欄位';
                    errorMsg.classList.remove('hidden');
                    return;
                }

                loginBtn.textContent = '登入中...';
                loginBtn.disabled = true;

                // 串接原本的 Google Apps Script API
                fetch('https://script.google.com/macros/s/AKfycbz_S26N_eYvX-Y_iHshR81h83X_E4mD0uFas0-N9425W966_MREtN5N16Ym36zSj-mF/exec', {
                    method: 'POST',
                    mode: 'no-cors', // 配合您的 API 設定
                    cache: 'no-cache',
                    body: JSON.stringify({
                        action: 'login',
                        account: account,
                        mobile: mobile,
                        password: password
                    })
                })
                .then(() => {
                    // 由於 no-cors 無法取得 response，維持您原本的處理方式：
                    // 假設成功並記錄狀態，或依照您的實際 API 回傳邏輯修改
                    const mockUserData = {
                        Name: account,
                        Mobile: mobile,
                        Email: 'user@lohas.com',
                        Birthday: '1990/01/01'
                    };
                    
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userData', JSON.stringify(mockUserData));
                    
                    showUserProfile(mockUserData);
                    loginBtn.textContent = '登入';
                    loginBtn.disabled = false;
                })
                .catch(error => {
                    console.error('Error:', error);
                    errorMsg.textContent = '連線失敗，請稍後再試';
                    errorMsg.classList.remove('hidden');
                    loginBtn.textContent = '登入';
                    loginBtn.disabled = false;
                });
            });
        }

        // C. 側邊欄登出按鈕點擊事件 (新版 ID)
        if (logoutBtnSidebar) {
            logoutBtnSidebar.addEventListener('click', (e) => {
                e.preventDefault();
                handleLogout();
            });
        }
        
        // D. 額外支援原本可能的舊登出 ID
        const oldLogoutBtn = document.getElementById('logout-btn');
        if (oldLogoutBtn) {
            oldLogoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                handleLogout();
            });
        }
    });
</script>

</body>
</html>
